{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}{{ title }} — {{ game.title }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="mb-3">
            <a href="{% url 'games:game_details' game.pk %}" class="text-muted">
                ← {{ game.title }}
            </a>
        </div>
        <h3 class="mb-4">{{ title }}</h3>
        <form method="post">
            {% csrf_token %}
            {{ form|crispy }}
            <div class="d-flex gap-2 mt-3">
                <button type="submit" class="btn btn-primary">Salvar</button>
                <a href="{% url 'games:game_details' game.pk %}" class="btn btn-outline-secondary">
                    Cancelar
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
