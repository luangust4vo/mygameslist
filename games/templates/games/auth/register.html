{% extends 'base.html' %}

{% load crispy_forms_tags %}

{% block title %}Cadastro — MyGameList{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-4">
        <h2 class="mb-4">Criar conta</h2>
        <form method="post">
            {% csrf_token %}
            {{ form|crispy }}
            <button type="submit" class="btn btn-primary w-100">Cadastrar</button>
        </form>
        <p class="mt-3 text-center">
            Já tem conta? <a href="{% url 'games:login' %}">Entrar</a>
        </p>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    document.addEventListener('DOMContentLoaded', () => {
        document.querySelectorAll('.form-text').forEach(hint => {
            const ul = hint.querySelector('ul');
            const text = hint.textContent.trim();
            if (!text) return;

            const icon = document.createElement('span');
            icon.innerHTML = '&nbsp;&nbsp;<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="currentColor" viewBox="0 0 16 16"><path d="M8 15A7 7 0 1 1 8 1a7 7 0 0 1 0 14zm0 1A8 8 0 1 0 8 0a8 8 0 0 0 0 16z"/><path d="M5.255 5.786a.237.237 0 0 0 .241.247h.825c.138 0 .248-.113.266-.25.09-.656.54-1.134 1.342-1.134.686 0 1.314.343 1.314 1.168 0 .635-.374.927-.965 1.371-.673.489-1.206 1.06-1.168 1.987l.003.217a.25.25 0 0 0 .25.246h.811a.25.25 0 0 0 .25-.25v-.105c0-.718.273-.927 1.01-1.486.609-.463 1.244-.977 1.244-2.056 0-1.511-1.276-2.241-2.673-2.241-1.267 0-2.655.59-2.75 2.286zm1.557 5.763c0 .533.425.927 1.01.927.609 0 1.028-.394 1.028-.927 0-.552-.42-.94-1.029-.94-.584 0-1.009.388-1.009.94z"/></svg>';
            icon.style.cursor = 'pointer';
            icon.style.color = 'var(--bs-warning)';

            new bootstrap.Popover(icon, {
                content: ul ? ul.outerHTML : () => {
                    const itens = text
                        .split(/(?<=\.)\s+/)
                        .filter(i => i.trim());

                    if (itens.length <= 1) return text;

                    return '<ul class="mb-0 ps-3">' +
                        itens.map(i => `<li>${i}</li>`).join('') +
                        '</ul>';
                },
                html: true,
                trigger: 'hover focus',
                placement: 'right',
            });

            const label = hint.closest('.mb-3')?.querySelector('label');
            if (label) label.appendChild(icon);
            hint.style.display = 'none';
        });
    });
</script>
{% endblock %}
